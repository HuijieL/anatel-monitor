name: Fetch Anatel Data

on:
  schedule:
    - cron: '0 12 * * 1'     # 每周一 UTC 12:00 = BRT 09:00
  workflow_dispatch:          # 手动触发按钮

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch and filter Anatel data
        run: python scripts/fetch_anatel.py

      - name: Commit and push (with rebase retry)
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          git commit -m "data: update $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            if git pull --rebase origin main && git push origin main; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "All push attempts failed."
          exit 1
